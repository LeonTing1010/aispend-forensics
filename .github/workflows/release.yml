name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches manifest version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="${{ steps.version.outputs.version }}"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match manifest version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm install

      - name: Build extension
        run: npm run build

      - name: Package extension
        run: |
          cd dist
          zip -r ../aispend-forensics-${{ steps.version.outputs.version }}.zip . -x '*.map' -x '.*'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: aispend-forensics-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true

      - name: Upload to Chrome Web Store
        run: |
          npm install -g chrome-webstore-upload-cli
          chrome-webstore-upload upload \
            --source aispend-forensics-${{ steps.version.outputs.version }}.zip \
            --extension-id '${{ secrets.CWS_EXTENSION_ID }}' \
            --client-id '${{ secrets.CWS_CLIENT_ID }}' \
            --client-secret '${{ secrets.CWS_CLIENT_SECRET }}' \
            --refresh-token '${{ secrets.CWS_REFRESH_TOKEN }}' \
            --auto-publish
