<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 320px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 13px;
  color: #1a1a1b;
  background: #fff;
}
@media (prefers-color-scheme: dark) {
  body { background: #1a1a1b; color: #d7dadc; }
  .header { border-bottom-color: #343536; }
  .stat-value { color: #d7dadc; }
  .footer { border-top-color: #343536; }
  .footer a { color: #4fbcff; }
  .provider { border-bottom-color: #343536; }
}
.header {
  padding: 14px 16px;
  border-bottom: 1px solid #edeff1;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-icon { font-size: 20px; }
.header-title { font-weight: 700; font-size: 14px; }
.providers {
  padding: 12px 16px;
}
.provider {
  padding: 12px 0;
  border-bottom: 1px solid #edeff1;
}
.provider:last-child {
  border-bottom: none;
}
.provider-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.provider-name {
  font-weight: 600;
  font-size: 13px;
}
.provider-status {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 12px;
  background: #f6f7f8;
}
@media (prefers-color-scheme: dark) {
  .provider-status { background: #272729; }
}
.provider-status.connected {
  background: #dafbe1;
  color: #1a7f37;
}
@media (prefers-color-scheme: dark) {
  .provider-status.connected { background: #238636; color: #fff; }
}
.provider-status.error {
  background: #ffebe9;
  color: #cf222e;
}
@media (prefers-color-scheme: dark) {
  .provider-status.error { background: #da3633; color: #fff; }
}
.spend-display {
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.spend-amount {
  font-size: 24px;
  font-weight: 700;
  color: #1a1a1b;
}
@media (prefers-color-scheme: dark) {
  .spend-amount { color: #d7dadc; }
}
.spend-currency {
  font-size: 14px;
  font-weight: 500;
  opacity: 0.6;
}
.spend-period {
  font-size: 11px;
  opacity: 0.5;
  margin-left: 8px;
}
.trend {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 6px;
  font-size: 11px;
}
.trend.up {
  color: #cf222e;
}
.trend.down {
  color: #1a7f37;
}
@media (prefers-color-scheme: dark) {
  .trend.up { color: #ff7b72; }
  .trend.down { color: #7ee787; }
}
.empty-state {
  padding: 24px 16px;
  text-align: center;
  font-size: 12px;
  opacity: 0.6;
  line-height: 1.5;
}
.footer {
  padding: 10px 16px;
  border-top: 1px solid #edeff1;
  font-size: 11px;
  text-align: center;
}
.footer a {
  color: #0079d3;
  text-decoration: none;
}
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="header">
    <span class="header-title">AI-spend Forensics</span>
  </div>
  
  <div id="providers-container" class="providers">
    <!-- Providers will be populated by popup.js -->
    <div class="empty-state">
      Visit your AI tool dashboards to connect:<br>
      Cursor Settings, Claude Console, or Replit Billing
    </div>
  </div>
  
  <div class="footer">
    <a href="https://github.com/LeonTing1010/aispend-forensics" target="_blank">GitHub</a>
    &nbsp;&middot;&nbsp;
    <span id="last-sync">Never synced</span>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
